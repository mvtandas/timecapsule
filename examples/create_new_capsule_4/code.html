<!DOCTYPE html>

<html class="" lang="en"><head>
<meta charset="utf-8"/>
<meta charset="utf-8"/>
<link crossorigin="" href="https://fonts.gstatic.com/" rel="preconnect"/>
<link as="style" href="https://fonts.googleapis.com/css2?display=swap&amp;family=Noto+Sans%3Awght%40400%3B500%3B700%3B900&amp;family=Plus+Jakarta+Sans%3Awght%40400%3B500%3B700%3B800" onload="this.rel='stylesheet'" rel="stylesheet"/>
<title>Stitch Design</title>
<link href="data:image/x-icon;base64," rel="icon" type="image/x-icon"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<script>tailwind.config = {darkMode: "class", theme: {extend: {colors: {primary: "#FAC638", "background-light": "#f8f8f5", "background-dark": "#231e0f"}, fontFamily: {display: "Plus Jakarta Sans"}, borderRadius: {DEFAULT: "0.5rem", lg: "1rem", xl: "1.5rem", full: "9999px"}}}};</script>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-gray-800 dark:text-gray-200">
<div class="relative flex h-auto min-h-screen w-full flex-col justify-between">
<div class="flex-grow">
<div class="flex items-center p-4">
<button class="flex size-10 items-center justify-center rounded-full bg-background-light dark:bg-background-dark/50 text-gray-900 dark:text-white">
<span class="material-symbols-outlined">arrow_back_ios_new</span>
</button>
<h2 class="flex-1 text-center text-xl font-bold tracking-tight text-gray-900 dark:text-white pr-10">Create Capsule</h2>
</div>
<div class="p-4 space-y-6">
<div>
<h3 class="text-lg font-bold text-gray-900 dark:text-white mb-4">Add Content</h3>
<div class="flex items-center justify-center w-full h-32 border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-xl">
<div class="text-center">
<button class="flex items-center justify-center w-12 h-12 rounded-full bg-primary text-white mx-auto mb-2">
<span class="material-symbols-outlined">add</span>
</button>
<p class="text-sm font-medium text-gray-600 dark:text-gray-400">Tap to add Photos, Videos, Audio, Text</p>
</div>
</div>
</div>
<div>
<h3 class="text-lg font-bold text-gray-900 dark:text-white mb-4">Opening Time</h3>
<div class="grid grid-cols-3 gap-4">
<button class="px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-700 bg-gray-200 dark:bg-gray-800 text-sm font-semibold text-gray-900 dark:text-white">Specific Date</button>
<button class="px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-700 text-sm font-semibold text-gray-500 dark:text-gray-400">Countdown</button>
<button class="px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-700 text-sm font-semibold text-gray-500 dark:text-gray-400">Duration</button>
</div>
<div class="mt-4">
<input class="form-input w-full rounded-lg border-none bg-background-light/50 dark:bg-background-dark/50 px-4 py-3 text-base text-gray-900 dark:text-white placeholder-gray-500 dark:placeholder-gray-400 focus:ring-2 focus:ring-primary" type="date" value="2025-12-25"/>
</div>
</div>
<div>
<h3 class="text-lg font-bold text-gray-900 dark:text-white mb-4">Location</h3>
<div class="relative">
<input class="form-input w-full rounded-lg border-none bg-background-light/50 dark:bg-background-dark/50 px-4 py-3 pl-12 text-base text-gray-900 dark:text-white placeholder-gray-500 dark:placeholder-gray-400 focus:ring-2 focus:ring-primary" placeholder="Enter Location" value=""/>
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 dark:text-gray-400">location_on</span>
</div>
<p class="text-xs text-gray-500 dark:text-gray-400 mt-2 text-center">Use current location or select on map</p>
</div>
<div>
<h3 class="text-lg font-bold text-gray-900 dark:text-white mb-4">Privacy</h3>
<div class="flex items-center justify-between rounded-lg bg-background-light/50 dark:bg-background-dark/50 p-2">
<button class="flex-1 py-2 text-sm font-semibold text-center rounded-md bg-primary text-white shadow-md">Private</button>
<button class="flex-1 py-2 text-sm font-semibold text-center text-gray-500 dark:text-gray-400">Shared</button>
<button class="flex-1 py-2 text-sm font-semibold text-center text-gray-500 dark:text-gray-400">Public</button>
</div>
</div>
</div>
</div>
<div class="sticky bottom-0 bg-background-light dark:bg-background-dark p-4">
<button class="w-full rounded-xl bg-primary py-4 text-center text-base font-bold text-white shadow-lg shadow-primary/30">
<span>Create Time Capsule</span>
</button>
</div>
</div>
</body></html>
