<div class="relative flex min-h-screen w-full flex-col">

<div class="flex items-center justify-between p-4">
<div class="w-12"></div>
<h1 class="flex-1 text-center text-lg font-bold text-primary">My Capsules</h1>
<button class="flex h-12 w-12 items-center justify-center rounded-full text-primary dark:text-accent-dark">
<span class="material-symbols-outlined text-3xl"> add_circle </span>
</button>
</div>
<div class="border-b border-slate-200 dark:border-slate-800">
<nav class="flex justify-center gap-8 px-4">

<a class="border-b-2 border-transparent py-3 text-sm font-medium text-slate-500 dark:text-slate-400 hover:text-primary dark:hover:text-primary" href="#">Shared</a>
</nav>
</div>
</header>
<main class="flex-1 overflow-y-auto p-4">
<div class="space-y-4">

</div>
</div>
<div class="flex h-8 w-8 items-center justify-center text-slate-500 dark:text-slate-400">
<span class="material-symbols-outlined"> lock </span>
</div>
</div>
<div class="flex items-center justify-between gap-4 rounded-xl bg-white p-4 shadow-soft dark:bg-white/5 dark:shadow-none">

<div class="icon-wrapper icon-family bg-accent-light dark:bg-accent-dark"></div>
<div>
<p class="font-bold text-slate-900 dark:text-white">Family Trip</p>
<p class="text-sm text-slate-500 dark:text-slate-400">Opens in 1d 18h</p>
</div>
</div>
<div class="flex h-8 w-8 items-center justify-center text-slate-500 dark:text-slate-400">
<span class="material-symbols-outlined"> lock </span>
</div>
</div>
<div class="flex items-center justify-between gap-4 rounded-xl bg-white p-4 shadow-soft dark:bg-white/5 dark:shadow-none">

<div class="icon-wrapper icon-graduation bg-accent-light dark:bg-accent-dark"></div>
<div>
<p class="font-bold text-slate-900 dark:text-white">Graduation</p>
<p class="text-sm text-slate-500 dark:text-slate-400">Opens in 1d 18h</p>
</div>
</div>
<div class="flex h-8 w-8 items-center justify-center text-slate-500 dark:text-slate-400">
<span class="material-symbols-outlined"> lock </span>
</div>
</div>
<div class="flex items-center justify-between gap-4 rounded-xl bg-white p-4 shadow-soft dark:bg-white/5 dark:shadow-none">
<div class="flex items-center gap-4">
<div class="icon-wrapper icon-newyear bg-accent-light dark:bg-accent-dark"></div>
<div>
<p class="font-bold text-slate-900 dark:text-white">New Year's Eve</p>
<p class="text-sm text-slate-500 dark:text-slate-400">Opened on 2024-01-01</p>
</div>
</div>
<div class="flex h-8 w-8 items-center justify-center text-slate-500 dark:text-slate-400">
<span class="material-symbols-outlined"> lock_open </span>
</div>
</div>
</div>
</main>
<footer class="sticky bottom-0 border-t border-slate-200 dark:border-slate-800 bg-background-light/90 dark:bg-background-dark/90 backdrop-blur-sm pb-4 pt-2">
<nav class="flex items-start justify-around">
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined"> inventory_2 </span>
</div>
<p class="text-xs font-bold">Capsules</p>
</a>
<a class="flex flex-col items-center gap-1 text-slate-500 dark:text-slate-400 hover:text-primary dark:hover:text-primary" href="#">

<span class="material-symbols-outlined"> add_box </span>
</div>

</div>

</a>
</nav>

</div>
